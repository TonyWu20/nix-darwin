# Rime schema
# encoding: utf-8

schema:
  schema_id: xhup_fluency
  name: 小鶴音形·語句流
  version: "2018.9.18.0"
  author:
    - xhup by 鶴
    - Rime schema by Zhaosheng Pan <brglng@gmail.com>
  description: |
    小鶴雙拼音形方案·語句流錄入！
    以空格分詞、標點或回車上屏。
  dependencies:
    - flypydz

switches:
  - name: ascii_mode
    reset: 0
    states: [中文, 西文]
  - name: full_shape
    states: [半角, 全角]
  - name: simplification
    # reset: 1
    states: [汉字, 漢字]
  - name: ascii_punct
    states: [。，, ．，]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " ;'"

translator:
  dictionary: flypy
  enable_charset_filter: true
  enable_encoder: true
  enable_sentence: true
  encode_commit_history: true
  enable_completion: true
  enable_user_dict: true
  max_phrase_length: 14
  disable_user_dict_for_patterns:
    - "^z.*$"
    - "^oi.*$"

reverse_lookup:
  dictionary: flypydz
  prefix: "oi"
  suffix: "'"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

simplifier:
  option_name: simplification
  opencc_config: s2t.json

punctuator:
  __include: default:/punctuator # 从 default.yaml 导入 punctuator 的所有配置，为了引用 digit_separators 等属性
  full_shape:
    __include: default:/punctuator/full_shape # 从 default.yaml 导入配置
  half_shape:
    __include: default:/punctuator/half_shape # 从 default.yaml 导入配置
  symbols:
    __include: symbols_caps_v:/symbols # 从 symbols_caps_v.yaml 导入配置

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    reverse_lookup: "oi[a-z]*'?$"
